# Scheduled Full CI
#
# Runs every Monday at 06:00 UTC, and can be triggered manually.
#
# Steps:
#   1. Discover all examples dynamically (structure-agnostic).
#   2. Run them against stable, main, and (if available) rc Mesa
#      via the reusable example_validation.yml workflow.
#   3. Collect all results, update per-example registry files.
#   4. Regenerate GALLERY.md.
#   5. Create / update / close the GitHub health issue.
#   6. Commit and push registry + GALLERY changes.

name: Scheduled Full CI

on:
  push:
    branches:
      - examples-revivl
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Also allow manual runs from the Actions tab

jobs:
  # --------------------------------------------------------------------------
  # Step 1 — Discover all examples
  # --------------------------------------------------------------------------
  init-matrix:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.set-matrix.outputs.examples }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Example List
        id: set-matrix
        run: |
          EXAMPLES=$(python -c 'from scripts.discovery.discover_examples import discover_all_examples; import json; print(json.dumps(discover_all_examples()))')
          echo "examples=$EXAMPLES" >> $GITHUB_OUTPUT

  # --------------------------------------------------------------------------
  # Step 2 — Test via reusable workflow
  # --------------------------------------------------------------------------
  test-stable:
    needs: init-matrix
    uses: ./.github/workflows/example_validation.yml
    with:
      examples: ${{ needs.init-matrix.outputs.examples }}
      mesa_version: stable

  test-main:
    needs: init-matrix
    uses: ./.github/workflows/example_validation.yml
    with:
      examples: ${{ needs.init-matrix.outputs.examples }}
      mesa_version: main

  test-rc:
    needs: init-matrix
    uses: ./.github/workflows/example_validation.yml
    with:
      examples: ${{ needs.init-matrix.outputs.examples }}
      mesa_version: rc

  # --------------------------------------------------------------------------
  # Step 3 — Merge results, update registry + gallery, manage issue, commit
  # --------------------------------------------------------------------------
  update-and-publish:
    needs: [test-stable, test-main, test-rc, init-matrix]
    # The matrix jobs should ALWAYS finish, and then we publish their results
    # regardless of whether some examples passed or failed.
    if: always() && needs.init-matrix.result == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push registry/GALLERY changes
      issues: write     # needed for issue_manager.py

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml requests

      # Download all matrix results from each parallel job.
      # They arrive as folders named stable-0, stable-1, etc.
      - uses: actions/download-artifact@v4
        with:
          path: all_results/

      - name: Prepare results structure
        run: |
          mkdir -p results/
          find all_results -type f -name "*.json" -exec cp {} results/ \;

      - name: Update registry files
        run: |
          python scripts/state/build_registry.py \
            --results-dir results/ \
            --registry-dir registry/ \
            --search-root .

      - name: Generate GALLERY.md
        run: |
          python scripts/presentation/render_gallery.py \
            --registry-dir registry/ \
            --output GALLERY.md

      - name: Update GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/presentation/manage_issues.py \
            --registry-dir registry/ \
            --repo "${{ github.repository }}"

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/ GALLERY.md
          # Only commit if there is actually something to commit.
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: update registry and gallery [skip ci]"
            # Rebase to pick up any commits made by developers while tests were running
            git pull --rebase origin ${GITHUB_REF#refs/heads/}
            git push
          fi
